spring.application.name=api

# Enable loading variables from .env mapping properties syntax
spring.config.import=optional:file:.env[.properties]

# ===============================
# DATABASE CONFIGURATION
# ===============================
spring.datasource.url=jdbc:postgresql://${DB_HOST:db}:${DB_PORT:5432}/${DB_NAME:rgm}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE CONFIGURATION
# ===============================
# Automatically validate or export schema DDL to the database when the SessionFactory is created.
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries executed by Hibernate
spring.jpa.show-sql=true

# Format SQL queries to make them more readable
spring.jpa.properties.hibernate.format_sql=true


# ===============================
# MINIO / STORAGE CONFIGURATION
# ===============================
minio.url=${MINIO_URL:http://localhost:9000}
minio.access.key=${MINIO_ACCESS_KEY:root}
minio.secret.key=${MINIO_SECRET_KEY:password123}
minio.bucket.name=${MINIO_BUCKET_NAME:images}

# ===============================
# JWT CONFIGURATION
# ===============================
jwt.secret=${JWT_SECRET:rgm-default-secret-key-for-development-must-be-at-least-32-bytes}
jwt.expiration-hours=${JWT_EXPIRATION_HOURS:24}
