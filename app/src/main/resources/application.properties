spring.application.name=api

# Enable loading variables from .env mapping properties syntax
spring.config.import=optional:file:../.env[.properties],optional:file:.env[.properties]

# ===============================
# DATABASE CONFIGURATION
# ===============================
spring.datasource.url=jdbc:postgresql://${DB_HOST:db}:${DB_PORT:5432}/${DB_NAME:rgm}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE CONFIGURATION
# ===============================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# ===============================
# FLYWAY CONFIGURATION
# ===============================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ===============================
# ACTUATOR / HEALTH CHECK
# ===============================
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoint.prometheus.access=unrestricted
management.metrics.tags.application=${spring.application.name}

# ===============================
# MINIO / STORAGE CONFIGURATION
# ===============================
minio.url=${MINIO_URL:http://localhost:9000}
minio.public-url=${MINIO_PUBLIC_URL:${minio.url}}
minio.access.key=${MINIO_ACCESS_KEY:root}
minio.secret.key=${MINIO_SECRET_KEY:password123}
minio.bucket.name=${MINIO_BUCKET_NAME:images}

# ===============================
# JWT CONFIGURATION
# ===============================
jwt.secret=${JWT_SECRET}
jwt.expiration-hours=${JWT_EXPIRATION_HOURS:24}
jwt.refresh-expiration-days=${JWT_REFRESH_EXPIRATION_DAYS:7}

# ===============================
# CORS CONFIGURATION
# ===============================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# ===============================
# OPENAPI / SWAGGER
# ===============================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ===============================
# MULTIPART / FILE UPLOAD
# ===============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===============================
# RATE LIMITING
# ===============================
rate-limit.max-requests=${RATE_LIMIT_MAX_REQUESTS:10}
rate-limit.window-seconds=${RATE_LIMIT_WINDOW_SECONDS:60}
