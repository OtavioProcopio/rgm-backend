# ===============================
# DEV PROFILE
# ===============================

# JWT dev secret (NEVER use in production)
jwt.secret=rgm-default-secret-key-for-development-must-be-at-least-32-bytes

# SQL logging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Swagger enabled
springdoc.swagger-ui.enabled=true

# Increase rate limiting max requests for development and E2E test runs
rate-limit.max-requests=1000
