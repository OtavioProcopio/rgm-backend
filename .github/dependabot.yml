version: 2

updates:
  - package-ecosystem: maven
    directory: /app
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - chore
    commit-message:
      prefix: "chore"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - chore
    commit-message:
      prefix: "chore"

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - chore
    commit-message:
      prefix: "chore"
