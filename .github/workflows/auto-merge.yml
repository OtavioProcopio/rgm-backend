name: Sync develop → main (PR automático)

# Quando develop recebe um push, cria automaticamente um PR para main
# se ainda não existir. O merge em main exige CI passando + aprovação manual
# (configure branch protection em Settings → Branches → main).
# Se quiser auto-merge sem aprovação: habilite "Auto-merge" na PR criada.

on:
  push:
    branches: [develop]

permissions:
  contents: write
  pull-requests: write

jobs:
  open-pr:
    name: Abrir PR develop → main
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Criar PR develop → main (se não existir)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list --base main --head develop --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING já existe — nenhuma ação necessária."
          else
            gh pr create \
              --base main \
              --head develop \
              --title "chore: merge develop → main" \
              --body "PR gerado automaticamente após push em \`develop\`.

          **Antes de mergear:**
          - [ ] CI passou ✅
          - [ ] Changelog revisado
          - [ ] Versão no \`pom.xml\` atualizada (se necessário)

          Após o merge em \`main\`, o workflow de Release cria a tag, publica a imagem Docker e abre o GitHub Release automaticamente."
          fi
